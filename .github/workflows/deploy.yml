name: Deploy TextoPro

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Déploiement sur VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 72.62.148.170
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/textopro
            git pull origin main
            npm install --include=dev
            npm run build
            pm2 restart textopro
            echo "✅ TextoPro déployé avec succès"
